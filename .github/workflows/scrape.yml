name: QuickDryCleaningData

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    environment: developer
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Create Output Directory
        shell: pwsh
        run: |
          if (!(Test-Path "src/main/resources/output/")) {
            New-Item -ItemType Directory -Force -Path "src/main/resources/output/"
          }

      - name: Run Selenium Scraper
        run: mvn compile exec:java -D"exec.mainClass"="org.testing.Main"
        env:
          USER_ID: ${{ secrets.SCRAPE_USER }}
          USER_PASS: ${{ secrets.SCRAPE_PASS }}

      - name: Commit and Push changes
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          $branch = git rev-parse --abbrev-ref HEAD

          if (Test-Path "src/main/resources/output/data.js") {
            git add src/main/resources/output/data.js
            $status = git status --porcelain
            if ($status) {
                git commit -m "Automated hourly data update"
                git pull --rebase origin $branch
                git push origin $branch
            } else {
                Write-Host "No changes detected in data.js. Skipping commit."
            }
          } else {
            Write-Error "Error: data.js was not generated by the scraper."
            exit 1
          }
