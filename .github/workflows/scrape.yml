name: QuickDryCleaningData

on:
  schedule:
    - cron: '30 3-15 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    environment: developer
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Schedule Heartbeat
        shell: pwsh
        run: |
          # Convert UTC to IST for the logs
          $utcTime = [DateTime]::UtcNow
          $istTimeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("India Standard Time")
          $istTime = [System.TimeZoneInfo]::ConvertTime($utcTime, $istTimeZone)
          Write-Host "Heartbeat: Workflow triggered at $($istTime.ToString('yyyy-MM-dd HH:mm:ss')) IST"

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Create Output Directory
        shell: pwsh
        run: |
          if (!(Test-Path "src/main/resources/Output/")) {
            New-Item -ItemType Directory -Force -Path "src/main/resources/Output/"
          }

      - name: Run Selenium Scraper
        run: mvn compile exec:java -D"exec.mainClass"="org.testing.Main"
        env:
          USER_ID: ${{ secrets.SCRAPE_USER }}
          USER_PASS: ${{ secrets.SCRAPE_PASS }}

      - name: Commit and Push changes
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          $branch = git rev-parse --abbrev-ref HEAD

          # Stage all changes in the Output directory
          git add src/main/resources/Output/*
          
          $status = git status --porcelain
          if ($status) {
              Write-Host "Changes detected. Committing updates..."
              git commit -m "Automated update: OrderReport and Branch APIs"
              # Rebase helps avoid conflicts if the repo was updated while the scraper ran
              git pull --rebase origin $branch
              git push origin $branch
          } else {
              Write-Host "No changes detected. Skipping push."
          }
